# AG Lex edge gateway — host-facing nginx that fronts both the SPA and the
# FastAPI backend on a single port (8002, mapped in docker-compose.yml).
#
# Routing:
#   /api/  → backend (FastAPI, includes /api/health for the deploy probe)
#   /ws    → backend WebSocket (realtime fan-out, Phase 2.4)
#   /      → frontend (Vite build served by the frontend container)

upstream aglex_backend {
    server backend:8000;
}

upstream aglex_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Match the backend's MAX_UPLOAD_BYTES (25 MB cap, see main.py).
    client_max_body_size 30m;

    # --- API ---
    location /api/ {
        proxy_pass http://aglex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- WebSocket (realtime) ---
    location /ws {
        proxy_pass http://aglex_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- SPA ---
    location / {
        proxy_pass http://aglex_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
