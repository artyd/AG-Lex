server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Default nginx mime.types ships without an entry for `.mjs`, so PDF.js's
    # worker (pdf.worker.min-*.mjs) goes out as `application/octet-stream`
    # and the browser refuses the dynamic import. Augment the global mime
    # table with a single extra mapping — `include` first so the inherited
    # entries (text/html, text/css, application/javascript for .js, …) stay,
    # then add the missing .mjs row. A bare `types { … }` block without the
    # include would REPLACE the global map and the server would start
    # downloading index.html as application/octet-stream.
    include /etc/nginx/mime.types;
    types {
        application/javascript  mjs;
    }
    types_hash_max_size 2048;
    types_hash_bucket_size 128;

    # SPA: unknown paths fall back to index.html so React Router (or our
    # localStorage-backed router) handles the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # `.mjs` matters for pdfjs-dist's worker (pdf.worker.min-*.mjs) — without
    # it the request falls through to the SPA catch-all above, returns
    # index.html with 200, and the browser throws "Failed to fetch dynamically
    # imported module".
    location ~* \.(?:js|mjs|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|map)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
