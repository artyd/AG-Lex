server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html so React Router (or our
    # localStorage-backed router) handles the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # `.mjs` matters for pdfjs-dist's worker (pdf.worker.min-*.mjs) — without
    # it the request falls through to the SPA catch-all above, returns
    # index.html with 200, and the browser throws "Failed to fetch dynamically
    # imported module".
    location ~* \.(?:js|mjs|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|map)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
